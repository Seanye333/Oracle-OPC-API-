# ============================================================
# Oracle OPC P6 Pipeline - Docker Compose Stack
# Services: Airflow (webserver + scheduler), MinIO, PostgreSQL
#
# Usage:
#   cp .env.example .env   # fill in real values
#   docker-compose up -d
#   docker-compose exec airflow-webserver airflow db init
#   docker-compose exec airflow-webserver airflow users create \
#     --username admin --password admin --firstname Admin \
#     --lastname User --role Admin --email admin@example.com
# ============================================================

version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  env_file:
    - ../.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/airflow
    # Pass pipeline secrets as env vars (picked up by utils/config.py)
    OPC_BASE_URL: ${OPC_BASE_URL}
    OPC_TOKEN_URL: ${OPC_TOKEN_URL}
    OPC_CLIENT_ID: ${OPC_CLIENT_ID}
    OPC_CLIENT_SECRET: ${OPC_CLIENT_SECRET}
    OPC_SCOPE: ${OPC_SCOPE}
    ORACLE_HOST: ${ORACLE_HOST}
    ORACLE_PORT: ${ORACLE_PORT}
    ORACLE_SERVICE: ${ORACLE_SERVICE}
    ORACLE_USER: ${ORACLE_USER}
    ORACLE_PASSWORD: ${ORACLE_PASSWORD}
    ORACLE_SCHEMA: ${ORACLE_SCHEMA}
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    MINIO_SECURE: "false"
    MINIO_RAW_BUCKET: ${MINIO_RAW_BUCKET:-p6-raw}
    MINIO_PROCESSED_BUCKET: ${MINIO_PROCESSED_BUCKET:-p6-processed}
  volumes:
    - ../dags:/opt/airflow/dags
    - ../src:/opt/airflow/src
    - ../config:/opt/airflow/config
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - p6_net
  restart: unless-stopped

services:

  # ──────────────────────────────────────────
  # PostgreSQL (Airflow metadata DB)
  # ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - p6_net
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Airflow DB Init (one-shot)
  # ──────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username ${AIRFLOW_ADMIN_USER:-admin}
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
          --firstname Admin --lastname User
          --role Admin --email admin@example.com || true
      "
    restart: "no"

  # ──────────────────────────────────────────
  # Airflow Webserver
  # ──────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────
  # Airflow Scheduler
  # ──────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────
  # MinIO (S3-compatible object storage)
  # ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - p6_net
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_logs:
  minio_data:

networks:
  p6_net:
    driver: bridge
